services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: second-brain-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./vault:/vault:ro
    environment:
      # Override localhost defaults from .env — use Docker service names inside the network
      - REDIS_URL=redis://redis:6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - VAULT_PATH=/vault
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    env_file:
      - backend/.env
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: second-brain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: second-brain-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || wget -qO- http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: second-brain-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
    restart: unless-stopped

volumes:
  redis_data:
  chroma_data:
  n8n_data:
